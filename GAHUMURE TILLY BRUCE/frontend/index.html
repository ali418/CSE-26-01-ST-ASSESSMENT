<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCA Refugee Support Program</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #99CC32;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            font-family: "Arial Narrow", Arial, sans-serif;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background: #99CC32;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .container p {
            font-size: 36px;
            color: white;
            margin-bottom: 60px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            font-family: "- Agency FB";
            font-weight: normal;
        }

        .register-btn {
            background: white;
            color: #333;
            border: none;
            padding: 10px 70px;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.3s, background 0.3s;
            font-family: "Arial Narrow", Arial, sans-serif;
            letter-spacing: 1px;
            font-weight:bold;
        }

        .register-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .register-btn:active {
            transform: scale(0.95);
        }

        /* Responsive for smaller screens */
        @media (max-width: 768px) {
            .logo {
                width: 150px;
                height: 150px;
            }
            
            .container p {
                font-size: 24px;
                margin-bottom: 40px;
            }
            
            .register-btn {
                padding: 15px 50px;
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                width: 120px;
                height: 120px;
            }
            
            .container p {
                font-size: 20px;
                margin-bottom: 30px;
            }
            
            .register-btn {
                padding: 12px 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="../../assessment/logo & colors/fca-logo.jpg" alt="FCA Logo">
        </div>
        <p>Refugee Support Program</p>
        <a href="form.html" class="register-btn" style="color: #99CC32;">Register</a>
    </div>
</body>
</html>
