<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beneficiary Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<main>

<h2>Beneficiary Registration Form</h2>

<div id="successAlert" class="alert hidden">
Registration successful!
<button type="button" onclick="closeAlert()">Close</button>
</div>

<form id="registrationForm">

<label for="firstName">First Name</label>
<input type="text" id="firstName" name="firstName" placeholder="First Name" required>

<label for="lastName">Last Name</label>
<input type="text" id="lastName" name="lastName" placeholder="Last Name" required>

<label for="placeOfBirth">Place of Birth</label>
<input type="text" id="placeOfBirth" name="placeOfBirth" placeholder="Place of Birth" required>

<label for="dateOfBirth">Date of Birth</label>
<input type="date" id="dateOfBirth" name="dateOfBirth" required>

<label for="registrationDate">Date of Registration</label>
<input type="date" id="registrationDate" name="registrationDate">

<label for="joinDate">Date of Joining Camp</label>
<input type="date" id="joinDate" name="joinDate">

<p>Gender:</p>

<label>
<input type="radio" name="gender" value="Female" checked> Female
</label>

<label>
<input type="radio" name="gender" value="Male"> Male
</label>

<br><br>

<label for="nationality">Nationality</label>
<select id="nationality" name="nationality">
<option>Sudanese</option>
<option>Ugandan</option>
<option>Kenyan</option>
<option>Tanzanian</option>
<option>Burundian</option>
<option>Rwandese</option>
<option>Somali</option>
<option>South Sudanese</option>
</select>

<label for="maritalStatus">Marital Status</label>
<select id="maritalStatus" name="maritalStatus">
<option>Single</option>
<option>Married</option>
<option>Divorced</option>
<option>Widowed</option>
<option>Separated</option>
</select>

<label for="settlementCamp">Settlement Camp</label>
<select id="settlementCamp" name="settlementCamp">
<option>Gulu settlement camp</option>
<option>Arua settlement camp</option>
<option>Mbarara settlement camp</option>
<option>Kasese settlement camp</option>
<option>Busia settlement camp</option>
<option>Mbale settlement camp</option>
<option>Kigezi settlement camp</option>
</select>

<br><br>

<button type="submit">Submit</button>

</form>

</main>

<script src="index.js"></script>

</body>
</html>
